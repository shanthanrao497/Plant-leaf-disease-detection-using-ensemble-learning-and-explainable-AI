<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Leaf Disease Prediction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .loading {
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Plant Leaf Disease Predictor</a>
        </div>
    </nav>
    
    <div class="container mt-5 text-center">
        <h2>Upload an Image</h2>
        <input type="file" id="imageUpload" accept="image/*" class="form-control mt-3">
        <button class="btn btn-primary mt-3" id="predictButton">Predict</button>
        
        <div class="loading mt-3" id="loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
        
        <div class="mt-3" id="result" style="display: none;">
            <h3>Prediction Result:</h3>
            <p id="predictionText"></p>
            <img id="uploadedImage" src="" class="img-fluid" style="max-width: 300px; display: none;">
        </div>
    </div>
    
    <script>
        $(document).ready(function(){
            $('#predictButton').click(function(){
                var file = $('#imageUpload')[0].files[0];
                if (!file) {
                    alert('Please upload an image first.');
                    return;
                }
                
                var formData = new FormData();
                formData.append('file', file);
                
                $('#loading').show();
                $('#result').hide();
                
                $.ajax({
                    url: '/predict',
                    type: 'POST',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function(response) {
                        $('#loading').hide();
                        $('#result').show();
                        $('#predictionText').text('Predicted Leaf Disease: ' + response.class);
                        $('#uploadedImage').attr('src', response.image_url).show();
                    },
                    error: function() {
                        $('#loading').hide();
                        alert('Error in prediction. Try again.');
                    }
                });
            });
        });
    </script>
</body>
</html>
